<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Adicionar ao calendário</title>
</head>
<body>

<script>
  const icsContent = `
BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//ICS Demo//PT-BR
CALSCALE:GREGORIAN
METHOD:PUBLISH
BEGIN:VEVENT
UID:123456@rafaelsangali
DTSTAMP:20260320T120000Z
DTSTART:20260320T150000Z
DTEND:20260320T160000Z
SUMMARY:Reunião importante
DESCRIPTION:Evento criado pelo miniapp
LOCATION:Online
END:VEVENT
END:VCALENDAR
  `;

  const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "evento.ics";

  document.body.appendChild(link);
  link.click();
</script>

</body>
</html>
