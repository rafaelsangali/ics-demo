<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Adicionar ao calendário</title>
</head>
<body>

<button id="download">Adicionar ao calendário</button>

<script>
const icsContent = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Consorcio Magalu//Miniapp//PT-BR
CALSCALE:GREGORIAN
METHOD:PUBLISH
BEGIN:VEVENT
UID:event-123@consorcio.magalu
DTSTAMP:20260320T120000Z
DTSTART:20260320T150000Z
DTEND:20260320T160000Z
SUMMARY:Reunião importante
DESCRIPTION:Evento criado pelo miniapp
LOCATION:Online
STATUS:CONFIRMED
SEQUENCE:0
TRANSP:OPAQUE
END:VEVENT
END:VCALENDAR`;

document.getElementById("download").addEventListener("click", () => {
  const blob = new Blob([icsContent], { type: "text/calendar" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "evento.ics";

  document.body.appendChild(link);
  link.click();

  URL.revokeObjectURL(url);
});
</script>

</body>
</html>
